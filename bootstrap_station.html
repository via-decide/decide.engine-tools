<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Bootstrap Station</title><style>body{font-family:Arial;margin:20px}section{border:1px solid #ccc;padding:12px;margin-bottom:10px}</style></head><body><h1>Continuity-Safe Bootstrap Workstation</h1><section><h2>Bootstrap Status Viewer</h2><pre id='status'></pre></section><section><h2>Session Continuity Inspector</h2><pre id='session'></pre></section><section><h2>Recovery Timeline Viewer</h2><pre id='timeline'></pre></section><script>const now=new Date().toISOString();const checks=[['AGENTS.md',true],['.codex/instructions.md',true],['.codex/session.md',true]];const state=checks.every(x=>x[1])?'BOOTSTRAP_READY':'BOOTSTRAP_PARTIAL';document.getElementById('status').textContent=checks.map(x=>`${x[0]} ${x[1]?'✓':'✗'}`).join('\n')+`\nState: ${state}`;document.getElementById('session').textContent=`lineage_parent: missing_session\nbootstrap_epoch: ${now}\nreplay_readiness: admissible\nauthority: local_operator`;document.getElementById('timeline').textContent=`${now} :: detected bootstrap partial\n${now} :: deterministic session continuity restored\n${now} :: pipeline readiness verified`;</script></body></html>
