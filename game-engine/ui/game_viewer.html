<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Roguelike Game Viewer</title><style>body{background:#0a0e27;color:#e0e0e0;font-family:monospace}canvas{border:1px solid #2d3748}</style></head><body><h1>Roguelike Viewer</h1><canvas id="gameCanvas" width="640" height="320"></canvas><script>const c=document.getElementById('gameCanvas'),ctx=c.getContext('2d');for(let y=0;y<20;y++){for(let x=0;x<40;x++){ctx.fillStyle=(x===0||y===0||x===39||y===19)?'#2d3748':'#1a1f3a';ctx.fillRect(x*16,y*16,16,16);}}ctx.fillStyle='#6ee7b7';ctx.fillRect(10*16,10*16,16,16);</script></body></html>
