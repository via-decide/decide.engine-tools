<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Repository Station</title><style>body{font-family:Arial,sans-serif;margin:20px}section{border:1px solid #ccc;padding:12px;margin:0 0 10px}pre{white-space:pre-wrap}</style></head><body>
<h1>Repository Intelligence Workstation</h1>
<section><h2>Repository Lineage Viewer</h2><pre id="lineage">Loading...</pre></section>
<section><h2>Cross-Repo Graph Viewer</h2><pre id="graph">Loading...</pre></section>
<section><h2>Context Resolution Inspector</h2><pre id="context">Loading...</pre></section>
<section><h2>Replay Compatibility Viewer</h2><pre id="replay">Loading...</pre></section>
<script>
const fallback={status:'offline_unavailable',deterministic:true};
const read=(p)=>fetch(p).then(r=>r.ok?r.json():fallback).catch(()=>fallback);
Promise.all([read('./repository_indexes/repository-index.json'),read('./cross_repo_graphs/cross-repo-graph.json'),read('./resolved_contexts/repository-context.json'),read('./repository_replay/repository-replay.json')]).then(([a,b,c,d])=>{document.getElementById('lineage').textContent=JSON.stringify(a,null,2);document.getElementById('graph').textContent=JSON.stringify(b,null,2);document.getElementById('context').textContent=JSON.stringify(c,null,2);document.getElementById('replay').textContent=JSON.stringify(d,null,2);});
</script></body></html>
