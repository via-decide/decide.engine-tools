<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decide Engine Studio</title>
  <script src="../shared/vd-nav-fix.js"></script>
  <script src="../engine/core/game-loader.js"></script>
  <script src="../ai/simulation-generator.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0b0e13; color: #f2f6ff; }
    .shell { max-width: 1000px; margin: 0 auto; padding: 28px 16px; }
    h1 { margin: 0 0 8px; }
    .sub { margin: 0 0 24px; color: #97a8c2; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .card { border: 1px solid #2a3547; border-radius: 12px; background: #111722; padding: 14px; }
    .status { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px; border: 1px solid #3a516f; color: #b8d9ff; margin-bottom: 8px; }
    .launch { display: inline-block; margin-top: 10px; padding: 8px 12px; border-radius: 8px; background: #20304a; border: 1px solid #35507a; color: #f2f6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="shell">
    <h1>DECIDE ENGINE STUDIO</h1>
    <p class="sub">Available environments</p>
    <div class="grid" id="launcher-grid"></div>
  </div>

  <script>
    (async function renderLauncher() {
      if (window.SimulationGenerator && typeof window.SimulationGenerator.restoreGeneratedModules === 'function') {
        window.SimulationGenerator.restoreGeneratedModules();
      }

      const builtInGames = window.GameLoader && typeof window.GameLoader.loadManifest === 'function'
        ? await window.GameLoader.loadManifest()
        : [];

      window.DECIDE_GAME_MANIFEST = builtInGames;

      const generated = window.SimulationGenerator
        ? window.SimulationGenerator.getAllGenerated().map((entry) => ({
            name: entry.name,
            title: entry.config && entry.config.title,
            status: 'Generated',
            description: entry.config && entry.config.description,
            href: './ai-simulation-studio.html'
          }))
        : [];

      const cards = [
        ...builtInGames,
        {
          name: 'ai-simulation-studio',
          title: 'AI Simulation Studio',
          status: 'New',
          description: 'Generate simulations, strategy games, network games, and sandbox environments from prompts.',
          href: './ai-simulation-studio.html'
        },
        ...generated
      ];

      const grid = document.getElementById('launcher-grid');
      grid.innerHTML = '';

      cards.forEach((game) => {
        const article = document.createElement('article');
        article.className = 'card';
        article.innerHTML = `
          <div class="status">${game.status || 'Live'}</div>
          <h2>${game.title || game.name}</h2>
          <p>${game.description || 'Simulation environment module.'}</p>
          <a class="launch" href="${game.href || './ai-simulation-studio.html'}">Launch</a>
        `;
        grid.appendChild(article);
      });
    })();
  </script>
</body>
</html>
