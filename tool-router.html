<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tool Router - Find the perfect tool for your problem. Smart routing for 34+ productivity tools with 90% token savings.">
    <title>Tool Router - Find the Right Tool</title>
    <link rel="stylesheet" href="./_design-tokens.css">
    <link rel="stylesheet" href="./_ux-patterns.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #030508 0%, #0a0d12 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff671f 0%, #00e676 50%, #00d1ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a8b8;
            margin-bottom: 30px;
        }

        .router-section {
            background: rgba(10, 13, 18, 0.8);
            border: 2px solid #1a1f2a;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .question {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e8eaef;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .question::before {
            content: "🎯";
            font-size: 1.8rem;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .option-btn {
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 230, 118, 0.1) 0%, rgba(0, 209, 255, 0.1) 100%);
            border: 2px solid #1a1f2a;
            border-radius: 10px;
            color: #e8eaef;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .option-btn:hover {
            border-color: #00e676;
            background: linear-gradient(135deg, rgba(0, 230, 118, 0.2) 0%, rgba(0, 209, 255, 0.2) 100%);
            transform: translateY(-2px);
        }

        .option-btn:focus-visible {
            outline: 2px solid #ff671f;
            outline-offset: 3px;
        }

        .option-btn:active {
            transform: translateY(0);
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(255, 103, 31, 0.1) 0%, rgba(0, 230, 118, 0.1) 100%);
            border: 2px solid #1a1f2a;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            border-color: #ff671f;
            background: linear-gradient(135deg, rgba(255, 103, 31, 0.15) 0%, rgba(0, 230, 118, 0.15) 100%);
        }

        .tool-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff671f;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-description {
            color: #a0a8b8;
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .tool-benefits {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .benefit {
            font-size: 0.85rem;
            color: #00e676;
            padding: 8px 12px;
            background: rgba(0, 230, 118, 0.1);
            border-radius: 6px;
            border-left: 3px solid #00e676;
        }

        .action-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff671f, #00e676);
            color: #030508;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .action-btn:focus-visible {
            outline: 2px solid #030508;
            outline-offset: 2px;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .reset-btn {
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.3) 0%, rgba(0, 230, 118, 0.3) 100%);
            color: #00d1ff;
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            font-size: 1rem;
        }

        .savings-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #fbbf24;
            color: #030508;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            border-radius: 12px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #00e676;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #a0a8b8;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .tool-benefits {
                grid-template-columns: 1fr;
            }

            .options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        <div class="header">
            <h1 class="title">🧭 Tool Router</h1>
            <p class="subtitle">Find the perfect tool for your problem in seconds</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number">34+</div>
                <div class="stat-label">Tools Available</div>
            </div>
            <div class="stat">
                <div class="stat-number">90%</div>
                <div class="stat-label">Token Savings</div>
            </div>
            <div class="stat">
                <div class="stat-number">1,600+</div>
                <div class="stat-label">Possible Workflows</div>
            </div>
        </div>

        <div class="router-section">
            <div class="question">What do you want to do?</div>
            <div class="options" id="mainOptions">
                <button class="option-btn" onclick="selectProblem('code')" aria-label="Find coding and development tools">💻 Write Code</button>
                <button class="option-btn" onclick="selectProblem('content')" aria-label="Find content creation and writing tools">✍️ Create Content</button>
                <button class="option-btn" onclick="selectProblem('research')" aria-label="Find research and learning tools">🔬 Research & Learn</button>
                <button class="option-btn" onclick="selectProblem('business')" aria-label="Find business planning and strategy tools">💼 Business & Planning</button>
                <button class="option-btn" onclick="selectProblem('analysis')" aria-label="Find analysis and validation tools">📊 Analysis & Validation</button>
                <button class="option-btn" onclick="selectProblem('workflow')" aria-label="Find workflow automation and agent tools">⚙️ Build Workflows</button>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

                {

        function selectProblem(category) {
            const tools = toolRegistry[category];
            const resultsDiv = document.getElementById('results');

            let html = `
                <div class="router-section">
                    <div class="question">✨ Perfect Tools for You</div>
                    <div style="margin-bottom: 30px;">
            `;

            tools.forEach(tool => {
                html += `
                    <div class="result-card">
                        <div class="tool-name">
                            ${tool.name}
                            <span class="savings-badge">Save ${tool.savings}</span>
                        </div>
                        <div class="tool-description">${tool.description}</div>
                        <div class="tool-benefits">
                            <div class="benefit">⚡ ${tool.speed}</div>
                            <div class="benefit">🎯 ${tool.use}</div>
                        </div>
                        <a href="${tool.link}" class="action-btn">Open Tool</a>
                    </div>
                `;
            });

            html += `
                        <button class="action-btn reset-btn" onclick="resetRouter()" aria-label="Back to problem selection">← Try Another Problem</button>
                    </div>
                </div>
            `;

            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('active');
            document.getElementById('mainOptions').parentElement.style.display = 'none';

            // Add ARIA labels to action buttons
            document.querySelectorAll('.action-btn').forEach(btn => {
                if (!btn.getAttribute('aria-label')) {
                    btn.setAttribute('aria-label', 'Open tool: ' + btn.textContent.substring(0, 30));
                }
            });
        }

        function resetRouter() {
            document.getElementById('results').classList.remove('active');
            document.getElementById('results').innerHTML = '';
            document.getElementById('mainOptions').parentElement.style.display = 'block';
            window.scrollTo(0, 0);
        }
    </script>
    <script src="./_shared-utils.js"></script>
</body>
</html>
