<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workflow Builder • decide.engine</title>
  <style>
    :root {
      --bg: #060916;
      --panel: #11162a;
      --muted: #9ba7c7;
      --text: #f5f8ff;
      --primary: #6ea8fe;
      --border: #202a47;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1d2a55 0%, var(--bg) 45%);
      color: var(--text);
    }
    .page { width: min(1320px, 96vw); margin: 0 auto; padding: 18px 0 24px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .top h1 { margin: 0; font-size: clamp(1.3rem, 2.8vw, 2rem); }
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .btn.primary { background: linear-gradient(120deg, var(--primary), #9fc5ff); color: #051022; border: 0; font-weight: 700; }

    .layout {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .panel h2 { margin: 0 0 10px 0; font-size: 1.03rem; }
    .tools-list { display: grid; gap: 8px; max-height: 60vh; overflow: auto; }
    .tool-chip {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      text-align: left;
      cursor: grab;
      display: grid;
      gap: 2px;
    }
    .tool-chip span { color: var(--muted); font-size: 0.78rem; }

    .controls { display: grid; gap: 8px; margin-bottom: 10px; }
    .controls input, .controls select {
      width: 100%;
      background: #0d142a;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }

    .canvas {
      position: relative;
      min-height: 620px;
      border: 1px dashed #35508d;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
    }
    #workflow-edges {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #workflow-edges line { stroke: #8fb6ff; stroke-width: 2; }

    #workflow-nodes { position: absolute; inset: 0; }
    .wf-node {
      position: absolute;
      width: 120px;
      min-height: 68px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0d1429;
      padding: 7px;
      display: grid;
      gap: 4px;
      cursor: move;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
    }
    .wf-node.selected { border-color: #6ea8fe; }
    .wf-node small { color: var(--muted); font-size: 0.72rem; }
    .node-actions { display: flex; gap: 6px; }
    .node-actions button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      font-size: 0.72rem;
      padding: 3px 6px;
      cursor: pointer;
    }

    pre {
      margin: 10px 0 0;
      background: #0d142a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      max-height: 220px;
      overflow: auto;
      color: #c7ddff;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <h1>Workflow Builder</h1>
      <a class="btn" href="index.html">Back to Hub</a>
    </header>

    <div class="layout">
      <aside class="panel">
        <h2>Tool Registry</h2>
        <p style="color: var(--muted); margin-top: 0;">Drag tools to the canvas, connect nodes, then save or run.</p>
        <div id="tool-list" class="tools-list" aria-label="Available tools"></div>
      </aside>

      <section class="panel">
        <div class="controls">
          <label>
            Workflow ID
            <input id="workflow-id" type="text" placeholder="prompt-to-code" />
          </label>
          <div class="row">
            <button id="save-workflow" class="btn primary" type="button">Save Workflow</button>
            <button id="run-workflow" class="btn primary" type="button">Run Workflow</button>
            <button id="clear-canvas" class="btn" type="button">Clear Canvas</button>
            <button id="export-workflow" class="btn" type="button">Export JSON</button>
            <label class="btn" style="cursor:pointer">Import JSON<input id="import-workflow" type="file" accept="application/json" style="display:none"></label>
            <button id="export-workflow" class="btn" type="button">Export</button>
            <label class="btn" style="cursor:pointer">Import<input id="import-workflow" type="file" accept="application/json" style="display:none"></label>
          </div>
          <div class="row">
            <select id="saved-workflows" aria-label="Saved workflows"></select>
            <button id="load-workflow" class="btn" type="button">Load Workflow</button>
          </div>

          <label>
            Agent Task Prompt
            <input id="agent-task-prompt" type="text" placeholder="e.g. review code quality and generate delivery brief" />
          </label>
          <div class="row">
            <button id="build-agent-workflow" class="btn" type="button">Build Agent Workflow</button>
            <button id="run-agent-workflow" class="btn" type="button">Run Agent Preview</button>
          </div>
        </div>

        <div id="workflow-canvas" class="canvas" aria-label="Workflow canvas" tabindex="0">
          <svg id="workflow-edges" aria-hidden="true">
            <defs>
              <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
                <polygon points="0 0, 8 3.5, 0 7" fill="#8fb6ff"></polygon>
              </marker>
            </defs>
          </svg>
          <div id="workflow-nodes"></div>
        </div>

        <div id="autosave-status" style="margin-top:8px;color:var(--muted);font-size:0.8rem;">Autosave ready</div>
        <div id="autosave-status" style="color: var(--muted); font-size: 0.8rem; margin-top:8px;">Autosave ready</div>
        <pre id="workflow-steps-preview" aria-label="Workflow JSON preview"></pre>
      </section>
    </div>
  </main>

  <script src="shared/tool-registry.js"></script>
  <script src="shared/tool-bridge.js"></script>
  <script src="shared/workflow-storage.js"></script>
  <script src="shared/workflow-engine.js"></script>
  <script src="shared/agent-layer.js"></script>
  <script src="shared/workflow-ui.js"></script>
  <script>
    window.WorkflowUI.init();
  </script>
</body>
</html>
