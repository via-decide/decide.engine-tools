<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PromptAlchemy</title>
  <link rel="stylesheet" href="../../shared/shared.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>PromptAlchemy</h1>
      <p>Turn raw ideas into structured prompts that other tools can use consistently.</p>
    </header>

    <section class="grid">
      <article class="card">
        <label for="idea">Idea</label>
        <textarea id="idea" placeholder="What are you trying to build?"></textarea>

        <label for="context">Context</label>
        <textarea id="context" placeholder="Audience, domain, constraints"></textarea>

        <label for="goal">Goal</label>
        <input id="goal" placeholder="e.g., Generate a tool spec" />

        <div class="toolbar">
          <button id="generate" class="primary">Generate Prompt</button>
          <button id="copy">Copy</button>
          <button id="download">Download</button>
        </div>
      </article>

      <article class="card">
        <h2>Structured Prompt</h2>
        <pre id="output" class="output"></pre>
      </article>
    </section>
  </main>

  <script src="../../shared/tool-storage.js"></script>
  <script src="tool.js"></script>
</body>
</html>
