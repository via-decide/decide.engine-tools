<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Context Packager</title>
  <link rel="stylesheet" href="../../shared/shared.css" />
  <script src="../../shared/vd-nav-fix.js"></script>
</head>
<body>
  <main class="app">
    <header>
      <h1>Context Packager</h1>
      <p>Package mission-critical context for reliable tool-to-tool handoffs.</p>
    </header>

    <section class="grid">
      <article class="card">
        <label for="task">Current task</label>
        <textarea id="task" placeholder="What is being executed?"></textarea>

        <label for="constraints">Constraints / guardrails</label>
        <textarea id="constraints" placeholder="What must not break?"></textarea>

        <label for="artifacts">Known artifacts / references</label>
        <textarea id="artifacts" placeholder="File paths, IDs, outputs, links..."></textarea>

        <div class="toolbar">
          <button id="generate" class="primary">Package Context</button>
          <button id="copy">Copy</button>
          <button id="download">Download</button>
        </div>
      </article>

      <article class="card">
        <h2>Context Package</h2>
        <pre id="output" class="output"></pre>
      </article>
    </section>
  </main>

  <script src="../../shared/tool-storage.js"></script>
  <script src="tool.js"></script>
</body>
</html>
