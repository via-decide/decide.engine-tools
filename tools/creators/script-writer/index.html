<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Script Writer · Creator Toolkit</title>
  <script defer src="../../../shared/vd-nav-fix.js"></script>
  <style>
    :root {
      --bg: #06060f; --bg2: #0e0e1a; --bg3: #14142a; --border: #1e1e3a;
      --accent: #f59e0b; --accent2: #fbbf24; --accent3: #fde68a;
      --text: #e2e8f0; --muted: #94a3b8; --success: #22c55e; --danger: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(900px 600px at 10% -10%, rgba(245,158,11,0.09), transparent 55%),
        radial-gradient(700px 500px at 90% 110%, rgba(251,191,36,0.06), transparent 55%),
        var(--bg);
      color: var(--text);
      padding: calc(16px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
    }
    .app { max-width: 860px; margin: 0 auto; }
    .header { margin-bottom: 24px; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #f59e0b, #d97706); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; background: linear-gradient(135deg, #fde68a, #e2e8f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: var(--muted); font-size: 0.9rem; }
    .key-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; font-size: 0.82rem; }
    .key-bar .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }
    .key-bar .dot.active { background: var(--success); }
    .key-bar .label { color: var(--muted); flex: 1; }
    .key-bar button { font-size: 0.78rem; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; }
    .key-bar button:hover { border-color: var(--accent); }
    .card { background: rgba(14,14,26,0.9); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
    .card h2 { font-size: 0.85rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
    label { display: block; font-size: 0.83rem; color: var(--muted); margin-bottom: 6px; }
    textarea, input[type="text"] { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; padding: 10px 12px; resize: vertical; outline: none; transition: border-color .2s; }
    textarea:focus, input[type="text"]:focus { border-color: var(--accent); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } }
    .select-pill { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.85rem; outline: none; cursor: pointer; }
    .select-pill:focus { border-color: var(--accent); }

    /* Tags input */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; min-height: 42px; padding: 6px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; cursor: text; transition: border-color .2s; align-items: center; }
    .tags-wrap:focus-within { border-color: var(--accent); }
    .tag { display: flex; align-items: center; gap: 4px; padding: 3px 8px; background: rgba(245,158,11,.15); border: 1px solid rgba(245,158,11,.3); border-radius: 999px; font-size: 0.78rem; color: var(--accent3); }
    .tag button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 0; line-height: 1; }
    .tag button:hover { color: var(--danger); }
    .tags-wrap input { flex: 1; min-width: 80px; background: none; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 0.85rem; padding: 2px 4px; }

    .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .btn-primary { flex: 1; min-width: 140px; padding: 12px 20px; border: none; border-radius: 10px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: opacity .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-secondary { padding: 12px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 0.85rem; cursor: pointer; transition: all .2s; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

    /* Script output */
    .script-wrap { font-size: 0.88rem; line-height: 1.7; }
    .script-section { margin-bottom: 20px; }
    .section-label {
      display: inline-flex; align-items: center; gap: 6px; font-size: 0.73rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; padding: 3px 10px; border-radius: 999px;
      margin-bottom: 8px;
    }
    .section-label.hook { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
    .section-label.intro { background: rgba(245,158,11,.15); color: var(--accent3); border: 1px solid rgba(245,158,11,.3); }
    .section-label.main { background: rgba(34,197,94,.12); color: #86efac; border: 1px solid rgba(34,197,94,.25); }
    .section-label.broll { background: rgba(99,102,241,.15); color: #c7d2fe; border: 1px solid rgba(99,102,241,.3); }
    .section-label.outro { background: rgba(236,72,153,.12); color: #fbcfe8; border: 1px solid rgba(236,72,153,.25); }
    .section-label.cta { background: rgba(245,158,11,.2); color: var(--accent3); border: 1px solid rgba(245,158,11,.4); }
    .section-text { color: var(--text); white-space: pre-wrap; word-break: break-word; padding-left: 8px; border-left: 2px solid var(--border); }
    .broll-text { color: var(--muted); font-style: italic; font-size: 0.82rem; }

    .script-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .script-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .meta-pill { font-size: 0.75rem; padding: 3px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 999px; color: var(--muted); }
    .copy-all-btn { padding: 8px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 0.82rem; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .copy-all-btn:hover { border-color: var(--accent); color: var(--text); }
    .copy-all-btn.copied { color: var(--success); border-color: var(--success); }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.2); border-top-color: #000; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.88rem; }
    .empty .big { font-size: 2.5rem; margin-bottom: 10px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; }
    .modal h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .modal p { font-size: 0.82rem; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .modal input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: monospace; font-size: 0.85rem; padding: 10px 12px; outline: none; margin-bottom: 12px; }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns .btn-primary { padding: 10px 20px; color: #000; }
    .modal-cancel { flex: 0; padding: 10px 16px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; font-size: 0.85rem; }
    .modal-cancel:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="icon">🎬</div>
      <h1>Script Writer</h1>
    </div>
    <p class="subtitle">Turn a topic into a complete YouTube script with hooks, sections, B-roll notes, and CTAs</p>
  </div>

  <div class="key-bar">
    <div class="dot" id="keyDot"></div>
    <span class="label" id="keyLabel">Claude API ready</span>
    
  </div>

  <div class="card">
    <h2>Video Setup</h2>
    <div style="margin-bottom:12px;">
      <label for="topic">Video Topic *</label>
      <input type="text" id="topic" placeholder="e.g. How I grew to 10K subscribers in 90 days" />
    </div>
    <div style="margin-bottom:12px;">
      <label>Keywords (press Enter to add)</label>
      <div class="tags-wrap" id="tagsWrap">
        <input type="text" id="tagInput" placeholder="Add keyword..." />
      </div>
    </div>
    <div class="grid2">
      <div>
        <label for="duration">Video Duration</label>
        <select class="select-pill" id="duration">
          <option value="3">Short (3 min)</option>
          <option value="5" selected>Medium (5 min)</option>
          <option value="10">Standard (10 min)</option>
          <option value="15">Long (15 min)</option>
          <option value="20">Deep Dive (20+ min)</option>
        </select>
      </div>
      <div>
        <label for="style">Content Style</label>
        <select class="select-pill" id="style">
          <option value="educational">Educational / Explainer</option>
          <option value="storytelling">Personal Story</option>
          <option value="tutorial">Step-by-Step Tutorial</option>
          <option value="listicle">Listicle / Top X</option>
          <option value="documentary">Mini Documentary</option>
          <option value="commentary">Commentary / Opinion</option>
          <option value="motivational">Motivational</option>
        </select>
      </div>
      <div>
        <label for="audience">Target Audience</label>
        <input type="text" id="audience" placeholder="e.g. Beginner creators, Gen Z entrepreneurs" />
      </div>
      <div>
        <label for="channel">Channel Niche</label>
        <input type="text" id="channel" placeholder="e.g. Personal finance, tech reviews" />
      </div>
    </div>
    <div style="margin-top:12px;">
      <label for="cta">Call to Action</label>
      <input type="text" id="cta" placeholder="e.g. Subscribe for weekly tips, buy my course, join Discord" />
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="generateBtn" onclick="generate()">
        <span class="btn-label">🎬 Write Script</span>
      </button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div id="resultsSection">
    <div class="empty">
      <div class="big">🎬</div>
      <div>Your full video script will appear here</div>
    </div>
  </div>
</div>

</div>

<script>
let tags = [];


// Tags
const tagInput = document.getElementById('tagInput');
tagInput.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ',') && tagInput.value.trim()) {
    e.preventDefault();
    addTag(tagInput.value.trim().replace(/,/g, ''));
    tagInput.value = '';
  } else if (e.key === 'Backspace' && !tagInput.value && tags.length) {
    removeTag(tags.length - 1);
  }
});
document.getElementById('tagsWrap').addEventListener('click', () => tagInput.focus());
function addTag(val) {
  if (!val || tags.includes(val)) return;
  tags.push(val);
  renderTags();
}
function removeTag(i) { tags.splice(i, 1); renderTags(); }
function renderTags() {
  const wrap = document.getElementById('tagsWrap');
  [...wrap.querySelectorAll('.tag')].forEach(el => el.remove());
  tags.forEach((t, i) => {
    const el = document.createElement('span');
    el.className = 'tag';
    el.innerHTML = escHtml(t) + `<button onclick="removeTag(${i})">×</button>`;
    wrap.insertBefore(el, tagInput);
  });
}

async function callClaude(systemPrompt, userMessage, maxTokens = 3000) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }]
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API ${res.status}`); }
  return (await res.json()).content[0].text;
}

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { document.getElementById('topic').focus(); return; }

  const duration = document.getElementById('duration').value;
  const style = document.getElementById('style').value;
  const audience = document.getElementById('audience').value.trim();
  const channel = document.getElementById('channel').value.trim();
  const cta = document.getElementById('cta').value.trim();
  const keywords = tags.join(', ');

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Writing script...</span>';

  try {
    const system = `You are a professional YouTube scriptwriter with millions of views of experience.
Write a complete, engaging video script. Use this exact JSON format:
{
  "title": "Suggested video title",
  "hook": "The opening 15-30 seconds script (pattern interrupt, bold statement, or question)",
  "intro": "Presenter intro + what the video covers (30-60 sec)",
  "sections": [
    { "title": "Section Name", "content": "Full script for this section", "broll": "B-roll suggestion" }
  ],
  "outro": "Summary and wrap-up (30 sec)",
  "cta": "Call to action script (15-20 sec)",
  "estimatedWords": 1200,
  "tips": ["Production tip 1", "SEO tip"]
}
Write naturally spoken dialogue. Mark [PAUSE] for dramatic pauses. Mark [GRAPHIC: description] for visual cues.
No markdown, only raw JSON.`;

    const user = `Topic: ${topic}
Keywords: ${keywords || 'none'}
Duration: ${duration} minutes
Style: ${style}
Audience: ${audience || 'general YouTube audience'}
Channel niche: ${channel || 'general'}
CTA: ${cta || 'subscribe and like'}
Write a complete script. For ${duration} min, aim for ~${Math.round(parseInt(duration) * 140)} words (speaking pace: ~140 wpm).`;

    const raw = await callClaude(system, user, 4000);
    const parsed = JSON.parse(raw.trim().replace(/^```json?\n?/, '').replace(/```$/, ''));
    renderScript(parsed, topic, duration, style);
  } catch(e) {
    if (e.message !== 'no key') alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-label">🎬 Write Script</span>';
  }
}

function renderScript(s, topic, duration, style) {
  const section = document.getElementById('resultsSection');
  const sectionsHtml = (s.sections || []).map((sec, i) => `
    <div class="script-section">
      <div class="section-label main">📋 Section ${i+1}: ${escHtml(sec.title)}</div>
      <div class="section-text">${escHtml(sec.content)}</div>
      ${sec.broll ? `<div style="margin-top:8px;"><span class="section-label broll">🎥 B-Roll</span><div class="section-text broll-text">${escHtml(sec.broll)}</div></div>` : ''}
    </div>`).join('');

  const tipsHtml = (s.tips || []).map(t => `<li style="margin-bottom:4px;">${escHtml(t)}</li>`).join('');

  const fullText = [
    `TITLE: ${s.title || topic}`,
    `\n[HOOK]\n${s.hook}`,
    `\n[INTRO]\n${s.intro}`,
    ...(s.sections||[]).map((sec,i) => `\n[SECTION ${i+1}: ${sec.title}]\n${sec.content}${sec.broll?`\n[B-ROLL: ${sec.broll}]`:''}`),
    `\n[OUTRO]\n${s.outro}`,
    `\n[CTA]\n${s.cta}`,
  ].join('\n');

  section.innerHTML = `
  <div class="card">
    <div class="script-header">
      <div>
        <div style="font-weight:700;font-size:1.05rem;margin-bottom:6px;">${escHtml(s.title || topic)}</div>
        <div class="script-meta">
          <span class="meta-pill">⏱ ${duration} min</span>
          <span class="meta-pill">🎯 ${style}</span>
          ${s.estimatedWords ? `<span class="meta-pill">📝 ~${s.estimatedWords} words</span>` : ''}
        </div>
      </div>
      <button class="copy-all-btn" id="copyAllBtn" onclick="copyAll(this)">Copy Full Script</button>
    </div>
    <div class="script-wrap" id="fullScriptEl">
      <div class="script-section">
        <div class="section-label hook">🔥 Hook</div>
        <div class="section-text">${escHtml(s.hook || '')}</div>
      </div>
      <div class="script-section">
        <div class="section-label intro">👋 Intro</div>
        <div class="section-text">${escHtml(s.intro || '')}</div>
      </div>
      ${sectionsHtml}
      <div class="script-section">
        <div class="section-label outro">🎬 Outro</div>
        <div class="section-text">${escHtml(s.outro || '')}</div>
      </div>
      <div class="script-section">
        <div class="section-label cta">📣 CTA</div>
        <div class="section-text">${escHtml(s.cta || '')}</div>
      </div>
    </div>
    ${tipsHtml ? `<div style="margin-top:20px;padding:14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);">
      <div style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Pro Tips</div>
      <ul style="padding-left:16px;font-size:0.82rem;color:var(--muted);">${tipsHtml}</ul>
    </div>` : ''}
    <div id="fullTextStore" style="display:none;">${escHtml(fullText)}</div>
  </div>`;
}

function copyAll(btn) {
  const el = document.getElementById('fullTextStore');
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✓ Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Full Script'; btn.classList.remove('copied'); }, 2000);
  });
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clearAll() {
  document.getElementById('topic').value = '';
  document.getElementById('audience').value = '';
  document.getElementById('channel').value = '';
  document.getElementById('cta').value = '';
  tags = []; renderTags();
  document.getElementById('resultsSection').innerHTML = '<div class="empty"><div class="big">🎬</div><div>Your full video script will appear here</div></div>';
}
updateKeyBar();
</script>
</body>
</html>
