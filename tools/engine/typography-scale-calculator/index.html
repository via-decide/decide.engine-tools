<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Typography Scale Calculator</title><style>body{font-family:system-ui;background:#111;color:#f8fafc;padding:20px}.w{max-width:680px;margin:0 auto}input{width:100%;margin:8px 0}pre{background:#020617;border:1px solid #334155;padding:12px;border-radius:8px;white-space:pre-wrap}</style>  <script src="../../../shared/vd-nav-fix.js"></script>
</head><body><div class="w"><h1>Aa Typography Scale Calculator</h1><label>Base size (px)<input id="base" type="number" value="16"></label><label>Ratio<input id="ratio" type="number" step="0.01" value="1.25"></label><button id="calc">Generate</button><pre id="out"></pre></div><script>calc.onclick=()=>{const b=Number(base.value),r=Number(ratio.value);const names=['xs','sm','base','lg','xl','2xl','3xl'];let txt=':root {\n';for(let i=0;i<names.length;i++){const p=(b*Math.pow(r,i-2)).toFixed(2);txt+=`  --text-${names[i]}: ${p}px;\n`;}txt+='}';out.textContent=txt;};calc.onclick();</script></body></html>
