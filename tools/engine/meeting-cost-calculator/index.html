<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Meeting Cost Calculator</title><style>body{font-family:system-ui;background:#0f172a;color:#e2e8f0;padding:20px}.w{max-width:640px;margin:0 auto}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}input{width:100%;padding:8px;border-radius:6px;border:1px solid #334155;background:#111827;color:#e2e8f0}.kpi{margin-top:16px;background:#111827;border:1px solid #334155;padding:14px;border-radius:10px;font-size:1.2rem}</style>  <script src="../../../shared/vd-nav-fix.js"></script>
</head><body><div class="w"><h1>⏱️ Meeting Cost Calculator</h1><div class="row"><label>Participants<input id="p" type="number" value="6" min="1"></label><label>Avg hourly rate ($)<input id="r" type="number" value="75" min="1"></label><label>Duration (minutes)<input id="m" type="number" value="45" min="1"></label><label>Prep time per person (minutes)<input id="prep" type="number" value="10" min="0"></label></div><div class="kpi" id="total"></div></div><script>function run(){const people=+p.value,rate=+r.value,mins=+m.value,prepM=+prep.value;const live=people*rate*(mins/60);const prep=people*rate*(prepM/60);total.textContent=`Estimated cost: $${(live+prep).toFixed(2)} (Live $${live.toFixed(2)} + Prep $${prep.toFixed(2)})`;}[p,r,m,prep].forEach(i=>i.oninput=run);run();</script></body></html>
