<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Traffic Router</title><style>body{font-family:system-ui;background:#0b1220;color:#e2e8f0;margin:0;padding:20px}.wrap{max-width:760px;margin:0 auto}.grid{display:grid;grid-template-columns:repeat(5,56px);gap:8px;margin:16px 0}.cell{height:56px;border:1px solid #334155;border-radius:8px;display:grid;place-items:center;cursor:pointer;background:#111827}.road{background:#1d4ed8}.start{background:#16a34a}.end{background:#dc2626}.muted{color:#94a3b8}</style></head><body><div class="wrap"><h1>🚦 Traffic Router</h1><p>Click tiles to build a road path from start to destination.</p><div class="grid" id="grid"></div><p id="status" class="muted">Build a connected route.</p></div><script>const n=5,start=0,end=n*n-1;const roads=new Set([start,end]);const g=document.getElementById('grid');function nbr(i){const r=Math.floor(i/n),c=i%n;return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([a,b])=>a>=0&&b>=0&&a<n&&b<n).map(([a,b])=>a*n+b);}function connected(){const q=[start],seen=new Set([start]);while(q.length){const cur=q.shift();for(const k of nbr(cur)){if(!roads.has(k)||seen.has(k))continue;seen.add(k);q.push(k);} }return seen.has(end);}function draw(){g.innerHTML='';for(let i=0;i<n*n;i++){const d=document.createElement('div');d.className='cell';if(i===start){d.classList.add('start');d.textContent='S';}else if(i===end){d.classList.add('end');d.textContent='D';}else if(roads.has(i)){d.classList.add('road');d.textContent='•';}d.onclick=()=>{if(i===start||i===end)return;roads.has(i)?roads.delete(i):roads.add(i);draw();};g.appendChild(d);}status.textContent=connected()?'Route connected ✅':'Build a connected route.';}draw();</script></body></html>
