<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Market Dynamics</title><style>body{font-family:system-ui;background:#101418;color:#f2f4f8;margin:0;padding:24px}.w{max-width:760px;margin:0 auto}.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:#17202a;border:1px solid #2d3a4a;border-radius:10px;padding:12px}.n{font-size:1.4rem;font-weight:700}input{width:100%}button{margin-top:12px;padding:8px 12px;background:#2d6cdf;color:white;border:none;border-radius:6px}</style></head><body><div class="w"><h1>📉 Market Dynamics</h1><p>Tune supply and demand pressure and run daily market ticks.</p><div class="card"><label>Supply Capacity <input id="supply" type="range" min="20" max="200" value="100"></label><label>Demand Strength <input id="demand" type="range" min="20" max="200" value="100"></label><label>Shock Volatility <input id="vol" type="range" min="0" max="40" value="10"></label><button id="tick">Run Day</button></div><div class="kpi"><div class="card"><div>Price Index</div><div class="n" id="price">100.0</div></div><div class="card"><div>Inventory</div><div class="n" id="inv">1000</div></div><div class="card"><div>Consumer Sentiment</div><div class="n" id="sent">50</div></div></div></div><script>let price=100,inv=1000,sent=50;function render(){priceEl.textContent=price.toFixed(1);invEl.textContent=Math.round(inv);sentEl.textContent=Math.round(sent);}tick.onclick=()=>{const s=Number(supply.value),d=Number(demand.value),v=Number(vol.value);const shock=(Math.random()*2-1)*v;const pressure=(d-s)/70;price=Math.max(20,price*(1+pressure*0.03+shock/800));inv=Math.max(0,inv+s*0.8-d*0.7-price*0.2);sent=Math.min(100,Math.max(0,sent+(d-s)/20-(price-100)/25));render();};const priceEl=document.getElementById('price'),invEl=document.getElementById('inv'),sentEl=document.getElementById('sent');render();</script></body></html>
