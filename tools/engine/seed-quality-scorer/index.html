<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seed Quality Scorer</title>
  <style>
    :root {
      --soil: #4b3621;
      --bark: #6b4f2a;
      --leaf: #2f6f3f;
      --moss: #4d8d5e;
      --cream: #f4efe4;
      --stone: #d9d2c3;
      --ink: #1f2a1f;
      --warning: #9a6b00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #f8f5ee 0%, #efe8d9 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem;
      display: grid;
      gap: 1rem;
    }

    .card {
      background: var(--cream);
      border: 1px solid var(--stone);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 6px 16px rgba(31, 42, 31, 0.08);
    }

    h1 { margin: 0 0 0.35rem; color: var(--leaf); }
    p { margin: 0.2rem 0 0.5rem; }

    .layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    label {
      display: block;
      margin: 0.75rem 0 0.35rem;
      font-weight: 600;
      color: var(--bark);
    }

    textarea, select, input[type="range"] {
      width: 100%;
      border: 1px solid #bfb6a4;
      border-radius: 8px;
      padding: 0.6rem;
      font: inherit;
      background: #fffefb;
      color: var(--ink);
    }

    textarea { min-height: 150px; resize: vertical; }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .value-pill {
      background: #e5efdf;
      color: #1f4a29;
      min-width: 3.2rem;
      text-align: center;
      padding: 0.25rem 0.45rem;
      border-radius: 999px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 0.62rem 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .08s ease, opacity .08s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 0.9; }

    .primary { background: var(--leaf); color: white; }
    .secondary { background: #d8cfbe; color: #2c2213; }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.6rem;
      margin: 0.5rem 0 1rem;
    }

    .stat {
      background: #faf7f0;
      border: 1px solid var(--stone);
      border-radius: 8px;
      padding: 0.55rem;
    }

    .stat small { color: #5f6b5f; display: block; }
    .stat strong { font-size: 1.15rem; }

    .warning { color: var(--warning); font-size: 0.9rem; }

    pre {
      margin: 0;
      background: #1f2a1f;
      color: #f0f6ee;
      border-radius: 10px;
      padding: 0.8rem;
      overflow: auto;
      min-height: 220px;
      font-size: 0.88rem;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Seed Quality Scorer</h1>
      <p>Score reusable knowledge seeds for orchard growth using fundamentals (roots), depth (trunk), and output readiness (fruit).</p>
      <p class="warning">Tip: Keep each metric between 0 and 100 for stable scoring.</p>
    </section>

    <section class="layout">
      <article class="card">
        <label for="growthFocus">Growth Focus</label>
        <select id="growthFocus">
          <option value="balanced">Balanced Orchard</option>
          <option value="root-heavy">Root-Heavy (Fundamentals)</option>
          <option value="fruit-heavy">Fruit-Heavy (Ship Outputs)</option>
        </select>

        <label for="seedInput">Seed Batch JSON</label>
        <textarea id="seedInput" aria-label="Seed batch input"></textarea>

        <label>Scoring Weights</label>
        <div class="range-row">
          <input id="weightClarity" type="range" min="10" max="60" value="35" />
          <span id="weightClarityValue" class="value-pill">35%</span>
        </div>
        <div class="range-row">
          <input id="weightViability" type="range" min="10" max="60" value="35" />
          <span id="weightViabilityValue" class="value-pill">35%</span>
        </div>
        <div class="range-row">
          <input id="weightGrowth" type="range" min="10" max="60" value="30" />
          <span id="weightGrowthValue" class="value-pill">30%</span>
        </div>

        <div class="toolbar">
          <button id="scoreBtn" class="primary" type="button">Score Seeds</button>
          <button id="resetBtn" class="secondary" type="button">Reset Demo Data</button>
        </div>
      </article>

      <article class="card">
        <div class="summary">
          <div class="stat"><small>Total Seeds</small><strong id="totalSeeds">0</strong></div>
          <div class="stat"><small>Average Score</small><strong id="avgScore">0.0</strong></div>
          <div class="stat"><small>Top Tier</small><strong id="topTier">-</strong></div>
        </div>
        <pre id="resultOutput" aria-live="polite"></pre>
      </article>
    </section>
  </main>
  <script src="./tool.js"></script>
</body>
</html>
