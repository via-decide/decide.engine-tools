<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Evolution</title>
  <style>
    body{margin:0;font-family:system-ui;background:#111;color:#f5f5f5;display:grid;place-items:center;min-height:100vh}
    .app{width:min(92vw,720px)}
    canvas{width:100%;aspect-ratio:1;border:1px solid #333;background:#0a0a0a}
    .row{display:flex;gap:8px;align-items:center;margin:12px 0;flex-wrap:wrap}
    button,input{background:#1f1f1f;color:#fff;border:1px solid #444;padding:8px 10px;border-radius:6px}
  </style>
</head>
<body>
  <div class="app">
    <h1>🧬 Grid Evolution</h1>
    <p>Conway-style cellular automata sandbox.</p>
    <canvas id="grid" width="600" height="600"></canvas>
    <div class="row">
      <button id="toggle">Start</button><button id="step">Step</button><button id="clear">Clear</button>
      <label>Density <input id="density" type="range" min="0.05" max="0.7" value="0.25" step="0.05" /></label>
      <button id="seed">Randomize</button>
    </div>
  </div>
<script>
const size=60, cell=10, c=document.getElementById('grid'),x=c.getContext('2d');
let alive=Array.from({length:size},()=>Array(size).fill(0)); let timer=null;
function randomize(){const p=Number(density.value); alive=alive.map(r=>r.map(()=>Math.random()<p?1:0)); draw();}
function draw(){x.clearRect(0,0,c.width,c.height); for(let i=0;i<size;i++)for(let j=0;j<size;j++){if(alive[i][j]){x.fillStyle='#52B756';x.fillRect(j*cell,i*cell,cell-1,cell-1);}}}
function next(){const n=alive.map(r=>r.slice()); for(let i=0;i<size;i++)for(let j=0;j<size;j++){let s=0;for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){if(!di&&!dj)continue;const ni=(i+di+size)%size,nj=(j+dj+size)%size;s+=alive[ni][nj];} n[i][j]=(s===3||(alive[i][j]&&s===2))?1:0;} alive=n; draw();}
function toggle(){if(timer){clearInterval(timer);timer=null;toggleBtn.textContent='Start';return;} timer=setInterval(next,120);toggleBtn.textContent='Pause';}
const toggleBtn=document.getElementById('toggle');
toggleBtn.onclick=toggle; step.onclick=next; clear.onclick=()=>{alive=alive.map(r=>r.map(()=>0)); draw();}; seed.onclick=randomize;
c.addEventListener('click',(e)=>{const r=c.getBoundingClientRect();const j=Math.floor((e.clientX-r.left)/(r.width/c.width*cell));const i=Math.floor((e.clientY-r.top)/(r.height/c.height*cell)); if(i>=0&&j>=0&&i<size&&j<size){alive[i][j]=alive[i][j]?0:1; draw();}});
randomize();
</script>
</body>
</html>
