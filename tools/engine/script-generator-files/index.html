<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Script Generator Files</title>
  <link rel="stylesheet" href="../../../shared/shared.css" />
  <style>
    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 12px; margin-top: 14px; }
    .stack { display: grid; gap: 10px; }
    .card h2 { margin: 0 0 8px; font-size: 1rem; color: var(--accent); }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin-top: 8px; }
    .tiny { font-size: 0.78rem; color: var(--muted); }
    .pack-grid { display: grid; gap: 10px; }
    .segment { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #0b1220; }
    .segment-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
    .segment-title { font-size: 0.85rem; color: var(--accent); margin: 0; }
    .segment textarea { min-height: 88px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .actions > button { width: auto; }
    .hidden { display: none; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
  <script src="../../../shared/vd-nav-fix.js"></script>
</head>
<body>
  <main class="app">
    <header>
      <h1>Script Generator Files</h1>
      <p>Generate a complete script pack, then copy each block or copy all in one click.</p>
    </header>

    <section class="layout">
      <article class="card stack">
        <div>
          <label for="brief">Master Brief</label>
          <textarea id="brief" placeholder="Describe the topic, audience, and key message"></textarea>
        </div>
        <div>
          <label for="format">Format</label>
          <select id="format">
            <option value="video">Video</option>
            <option value="demo">Demo</option>
            <option value="sales">Sales</option>
          </select>
        </div>
        <div>
          <label for="length">Length</label>
          <input id="length" placeholder="e.g. 90 seconds" />
        </div>
        <div>
          <label for="tone">Tone</label>
          <input id="tone" placeholder="e.g. clear and confident" />
        </div>
        <div class="actions">
          <button id="generate" class="primary">Generate Pack</button>
          <button id="copyAll">Copy All</button>
          <button id="download">Download</button>
        </div>
        <div id="status" class="tiny">Ready.</div>
      </article>

      <article class="card">
        <h2>Script Pack</h2>
        <div id="pack" class="pack-grid"></div>
      </article>
    </section>
  </main>

  <script src="../../../shared/tool-storage.js"></script>
  <script src="tool.js"></script>
</body>
</html>
