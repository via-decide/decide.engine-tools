<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Creative Studio Template — Kutch Digital Map</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  :root { --font-main: 'Outfit', sans-serif; --brand: #9c27b0; --bg: #050505; --surface: #111; --surface2: #1a1a1a; --border: #222; --text: #fff; --muted: #888; --radius: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-main); line-height: 1.6; }
  
  .topbar { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 20px 48px; display: flex; justify-content: space-between; align-items: center; }
  .topbar-name { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
  .get-btn { font-size: 10px; padding: 8px 24px; background: #fff; color: #000; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
  .get-btn:hover { background: var(--brand); color: #fff; }

  .hero { text-align: center; padding: 200px 24px; position: relative; overflow: hidden; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
  .hero h1 { font-size: clamp(50px, 12vw, 120px); font-weight: 900; letter-spacing: -4px; text-transform: uppercase; line-height: 0.9; }
  .hero-tagline { font-size: 14px; color: var(--brand); letter-spacing: 10px; text-transform: uppercase; margin-top: 40px; }

  .section { padding: 100px 48px; }
  .masonry { columns: 3; column-gap: 20px; }
  .item { break-inside: avoid; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.4s; }
  .item:hover { transform: scale(1.02); border-color: var(--brand); }
  .item::after { content: 'HIGH RES PORTFOLIO'; font-size: 10px; opacity: 0.2; letter-spacing: 2px; }

  @media (max-width: 900px) { .masonry { columns: 2; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-name">THE STUDIO TEMPLATE</div>
  <button class="get-btn">CLAIM THIS AESTHETIC</button>
</div>

<div class="hero">
  <h1>Visual<br>Poetry</h1>
  <div class="hero-tagline">Cinematic · Bold · Creative</div>
</div>

<div class="section">
  <div class="masonry">
    <div class="item"></div>
    <div class="item" style="aspect-ratio: 2/3"></div>
    <div class="item" style="aspect-ratio: 3/2"></div>
    <div class="item"></div>
    <div class="item" style="aspect-ratio: 4/5"></div>
    <div class="item"></div>
  </div>
</div>

<footer style="padding: 100px; text-align: center; color: var(--muted); letter-spacing: 2px; font-size: 11px; text-transform: uppercase;">
  Built for photographers and creators in Kutch.
</footer>

</body>
</html>
