<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>📈 Revenue Forecaster</title>
<script src="../../shared/vd-nav-fix.js"></script>
<style>:root{--bg:#0f0d0c;--bg2:#1a1614;--bg3:#231e1b;--border:#3a2e28;--text:#f0e4d0;--muted:#8a7568;--leaf:#52B756}body{margin:0;padding:24px;background:var(--bg);color:var(--text);font-family:system-ui}.w{max-width:980px;margin:0 auto}.grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px}input,button{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text)}button{background:var(--leaf);color:#081008;border:0;font-weight:700;cursor:pointer}table{width:100%;border-collapse:collapse;margin-top:14px;font-size:.92rem}th,td{padding:8px;border:1px solid var(--border);text-align:right}th:first-child,td:first-child{text-align:center}pre{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;white-space:pre-wrap;overflow:auto}</style></head>
<body><div class="w"><h1>📈 Revenue Forecaster</h1><div class="grid"><input id="start" type="number" value="10000" min="0" step="100" placeholder="Starting MRR"><input id="growth" type="number" value="12" step="0.1" placeholder="Growth %"><input id="churn" type="number" value="3" step="0.1" placeholder="Churn %"><input id="months" type="number" value="12" min="1" max="36" step="1" placeholder="Months"></div><p><button id="run">Forecast</button> <button id="csv">Download CSV</button></p><div id="table"></div><h3>ASCII MRR chart</h3><pre id="chart"></pre></div>
<script>
const fmt=(n)=>`$${n.toFixed(2)}`; let rows=[];
function forecast(){
  const s=Number(start.value)||0,g=(Number(growth.value)||0)/100,c=(Number(churn.value)||0)/100,m=Math.max(1,Math.min(36,Number(months.value)||1));
  let mrr=s,cum=0; rows=[];
  for(let i=1;i<=m;i++){const newM=mrr*g; const churned=mrr*c; mrr=mrr+newM-churned; cum+=mrr; rows.push({month:i,newM,churned,net:mrr,cum});}
  table.innerHTML = `<table><thead><tr><th>Month</th><th>New MRR</th><th>Churned</th><th>Net MRR</th><th>Cumulative</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.month}</td><td>${fmt(r.newM)}</td><td>${fmt(r.churned)}</td><td>${fmt(r.net)}</td><td>${fmt(r.cum)}</td></tr>`).join('')}</tbody></table>`;
  const max = Math.max(...rows.map(r=>r.net),1);
  chart.textContent = rows.map(r=>`M${String(r.month).padStart(2,'0')} ${'█'.repeat(Math.max(1,Math.round((r.net/max)*40)))} ${fmt(r.net)}`).join('\n');
}
run.onclick=forecast;
csv.onclick=()=>{if(!rows.length)forecast();const lines=['Month,New MRR,Churned,Net MRR,Cumulative',...rows.map(r=>[r.month,r.newM.toFixed(2),r.churned.toFixed(2),r.net.toFixed(2),r.cum.toFixed(2)].join(','))];const blob=new Blob([lines.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='revenue-forecast.csv';a.click();URL.revokeObjectURL(a.href);};
forecast();
</script></body></html>
