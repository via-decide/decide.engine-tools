<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaMath | The Blueprint (Plato)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505; overflow: hidden;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas { display: block; }

        /* Act Indicator */
        #act-indicator {
            position: absolute; top: 30px; left: 30px;
            color: #E2E8F0; font-size: 14px; font-weight: bold; letter-spacing: 3px;
            text-transform: uppercase; z-index: 10;
            transition: opacity 0.4s ease-in-out; opacity: 1;
        }

        /* Main Info Box */
        #label {
            position: absolute; top: 60px; left: 30px;
            letter-spacing: 1px; border-left: 4px solid #E2E8F0; 
            padding-left: 20px; z-index: 10;
            background: rgba(5, 5, 5, 0.85); padding-right: 20px;
            padding-bottom: 15px; border-radius: 0 10px 10px 0;
            backdrop-filter: blur(8px); max-width: 80%;
            transition: opacity 0.4s ease-in-out; opacity: 1;
        }
        h1 { margin: 0; font-size: 26px; font-weight: 300; text-transform: uppercase; color: #fff; }
        #subtitle { color: #CBD5E0; font-size: 16px; margin-top: 5px; font-weight: bold; letter-spacing: 2px; }
        #description { color: #A0AEC0; font-size: 15px; margin-top: 10px; max-width: 450px; line-height: 1.6; }

        /* Insight Bar */
        #insight-bar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 0; text-align: center;
            font-size: 16px; color: #eee; letter-spacing: 1px;
            font-family: monospace; backdrop-filter: blur(5px);
            transition: opacity 0.4s ease-in-out; opacity: 1;
        }
        .highlight { color: #fff; font-weight: bold; text-decoration: underline; }

        /* Tap hint & Logo */
        #nav-hint {
            position: absolute; top: 30px; right: 30px;
            color: #555; font-size: 12px; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer;
            transition: opacity 0.4s ease-in-out; text-align: right;
        }
        .viamath-logo { color: #fff; font-weight: bold; font-size: 16px; margin-bottom: 5px; letter-spacing: 3px;}

        @media (max-width: 700px) {
            #act-indicator { top: 20px; left: 10px; font-size: 12px; }
            #label { top: 45px; left: 10px; padding-left: 15px; max-width: 90%; }
            h1 { font-size: 20px; }
            #subtitle { font-size: 14px; }
            #description { font-size: 13px; max-width: 100%; }
            #insight-bar { font-size: 12px; padding: 10px 0; }
            #nav-hint { top: 10px; right: 10px; font-size: 10px; }
        }
    </style>
</head>
<body onclick="nextScreen()">
    <div id="nav-hint">
        <a href="../../" style="text-decoration:none"><div class="viamath-logo">← VIALOGIC</div></a>
        Tap anywhere to advance ➔
    </div>
    
    <div id="act-indicator">ACT I: THE WORLD OF FORMS</div>

    <div id="label">
        <h1 id="title">Title</h1>
        <p id="subtitle">Subtitle</p>
        <p id="description">Description goes here.</p>
    </div>

    <div id="insight-bar">
        <span class="highlight">PHILOSOPHICAL INSIGHT:</span> <span id="insight-text">Loading...</span>
    </div>

<script>
let time = 0;
let state = 0;

let isTransitioning = false;
let fadeAlpha = 0;
let fadeDirection = 0;
let targetState = 0;
const FADE_SPEED = 12;
const TOTAL_SCREENS = 10;

let particles = [];

const content = [
    // ACT I: THE PHILOSOPHER KING
    {
        title: "The Thinker's Shadow", sub: "The Academy of Athens",
        desc: "In 387 BCE, Plato founded the first university in the Western world: The Academy. Above its door was a warning: 'Let no one ignorant of geometry enter here.'",
        insight: "He believed mathematics was the only path to absolute truth."
    },
    {
        title: "The Cave Allegory", sub: "Truth Beyond Senses",
        desc: "Plato argued that what we see with our eyes are just shadows on a wall. The real world—the World of Forms—can only be seen through the eye of the mind... through math.",
        insight: "A circle you draw is imperfect; the IDEA of a circle is perfect."
    },
    {
        title: "Mathematical Reality", sub: "Discovered, Not Invented",
        desc: "To Plato, numbers and shapes were not human inventions. They were eternal truths that existed in a higher dimension, waiting to be discovered by those brave enough to look up.",
        insight: "Math is the language that exists whether humans are here to speak it or not."
    },
    // ACT II: SACRED GEOMETRY (THE SOLIDS)
    {
        title: "The Platonic Solids", sub: "Nature's Blueprint",
        desc: "Plato identified five perfect shapes where every face is identical and every vertex meets the same way. These 5 solids are the building blocks of the entire physical cosmos.",
        insight: "There are only five regular convex polyhedra possible in 3D space."
    },
    {
        title: "The Fire (Tetrahedron)", sub: "Sharp and Piercing",
        desc: "The 4-sided Tetrahedron represents Fire. Its sharp vertices symbolize the stinging heat of flames and the fundamental energy of transformation.",
        insight: "Composed of 4 equilateral triangles."
    },
    {
        title: "The Earth (Hexahedron)", sub: "Solid and Stable",
        desc: "The 6-sided Cube represents the Earth. Its flat bases and right angles symbolize stability, weight, and the grounded nature of the physical world.",
        insight: "Composed of 6 perfect squares."
    },
    {
        title: "The Air & Water", sub: "Fluid and Flowing",
        desc: "The 8-sided Octahedron (Air) and the 20-sided Icosahedron (Water) represent the fluid elements. They symbolize movement, life, and the vast oceans of the mind.",
        insight: "The Icosahedron has the highest volume relative to its surface area of the triangles."
    },
    {
        title: "The Cosmos (Dodecahedron)", sub: "The Quintessence",
        desc: "The 12-sided Dodecahedron represents the Universe itself. Plato believed it was the shape used to 'embroider' the stars onto the fabric of the heavens.",
        insight: "Composed of 12 perfect pentagons. It is the bridge to the divine."
    },
    // ACT III: THE BRIDGE TO THE MODERN WORLD
    {
        title: "Platonic Influence", sub: "From Kepler to Quantum",
        desc: "From Johannes Kepler trying to map the planets to modern physicists studying the structure of atoms, Plato's vision of a mathematically ordered universe remains the goal of science.",
        insight: "The architecture of the universe is inherently geometric."
    },
    {
        title: "The Journey Home", sub: "Transcending the Shadow",
        desc: "Every time you solve a problem, you are stepping out of the Cave and into the Light of the Forms. You are seeing the blueprint of the architect. Welcome back to the Academy.",
        insight: "ViaMath: The path to the Eternal. Welcome home."
    }
];

function setup() {
    createCanvas(windowWidth, windowHeight, WEBGL);
    for(let i=0; i<60; i++) particles.push({x: random(-width, width), y: random(-height, height), z: random(-500, 500), s: random(1, 3)});
    updateUI();
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }

function nextScreen() {
    // AWARD LOGIC
    if (state === TOTAL_SCREENS - 1) {
        if (!window.hasAwarded) {
             window.parent.postMessage({ type: 'sparks_award', amount: 250 }, '*');
             window.hasAwarded = true;
        }
    }

    if (isTransitioning) return;
    isTransitioning = true;
    fadeDirection = 1;
    targetState = (state + 1) % TOTAL_SCREENS;
    
    document.getElementById("label").style.opacity = 0;
    document.getElementById("insight-bar").style.opacity = 0;
    document.getElementById("nav-hint").style.opacity = 0;
    document.getElementById("act-indicator").style.opacity = 0;
}

function updateUI() {
    document.getElementById("title").innerText = content[state].title;
    document.getElementById("subtitle").innerText = content[state].subtitle;
    document.getElementById("description").innerText = content[state].desc;

    let actInd = document.getElementById("act-indicator");
    let labelBorder = document.getElementById("label");
    
    if (state < 3) {
        actInd.innerText = "ACT I: THE WORLD OF FORMS";
        actInd.style.color = "#E2E8F0";
        labelBorder.style.borderLeftColor = "#E2E8F0";
    } else if (state < 8) {
        actInd.innerText = "ACT II: THE SACRED GEOMETRY";
        actInd.style.color = "#FFD700"; // Gold
        labelBorder.style.borderLeftColor = "#FFD700";
    } else {
        actInd.innerText = "ACT III: THE LEGACY OF THE THINKER";
        actInd.style.color = "#63B3ED"; // Light Blue
        labelBorder.style.borderLeftColor = "#63B3ED";
    }

    document.getElementById("insight-text").innerText = content[state].insight;
}

function draw() {
    background(5);
    
    time += 0.01;

    // Background particles
    noStroke();
    for(let p of particles) {
        push();
        translate(p.x, p.y + sin(time)*20, p.z);
        fill(255, 100);
        sphere(p.s);
        pop();
    }

    // State Router for 3D Assets
    if      (state === 0) drawAcademy();
    else if (state === 1) drawCaveShadows();
    else if (state === 2) drawInfiniteGrid();
    else if (state === 3) drawAllSolids();
    else if (state === 4) drawTetra();
    else if (state === 5) drawCube();
    else if (state === 6) drawLiquidSolids();
    else if (state === 7) drawDodeca();
    else if (state === 8) drawAtomicGrid();
    else if (state === 9) drawLegacyCore();

    // Cinematic fade overlay
    drawFadeEffect();
}

function drawFadeEffect() {
    if (isTransitioning) {
        fadeAlpha += FADE_SPEED * fadeDirection;
        if (fadeDirection === 1 && fadeAlpha >= 255) {
            fadeAlpha = 255; fadeDirection = -1;
            state = targetState; time = 0;
            updateUI();
            document.getElementById("label").style.opacity = 1;
            document.getElementById("insight-bar").style.opacity = 1;
            document.getElementById("act-indicator").style.opacity = 1;
            if (state !== 9) document.getElementById("nav-hint").style.opacity = 1;
        } else if (fadeDirection === -1 && fadeAlpha <= 0) {
            fadeAlpha = 0; isTransitioning = false; fadeDirection = 0;
        }
        push(); resetMatrix(); translate(0,0,100); fill(5, fadeAlpha); rect(-width,-height,width*2,height*2); pop();
    }
}

// -------------------------------------------------------------
// ACT III SCREENS (PLATONIC CORE)
// -------------------------------------------------------------

function drawAcademy() {
    push();
    rotateY(time * 0.5);
    stroke(255, 50); noFill();
    for(let i=0; i<3; i++) {
        push(); translate(0, 0, i*50); rect(-100, -150, 200, 300); pop();
    }
    pop();
}

function drawCaveShadows() {
    push();
    let x = sin(time)*200;
    pointLight(255, 255, 255, x, 0, 300);
    rotateY(time);
    noStroke(); fill(200);
    sphere(100);
    pop();
}

function drawInfiniteGrid() {
    push();
    rotateX(PI/3);
    stroke(255, 20); noFill();
    for(let i=-10; i<10; i++) {
        line(i*50, -500, i*50, 500);
        line(-500, i*50, 500, i*50);
    }
    pop();
}

function drawAllSolids() {
    push(); rotateY(time); rotateX(time*0.3);
    stroke(255, 150); noFill();
    torus(200, 1);
    pop();
}

function drawTetra() {
    push(); rotateY(time); rotateX(time*0.5);
    stroke(255, 100, 0); noFill(); strokeWeight(2);
    // Rough tetrahedron
    beginShape(TRIANGLES);
    vertex(0, -100, 0); vertex(100, 100, 100); vertex(-100, 100, 100);
    vertex(0, -100, 0); vertex(-100, 100, 100); vertex(0, 100, -100);
    endShape();
    pop();
}

function drawCube() {
    push(); rotateY(time); rotateX(time);
    stroke(0, 150, 255); noFill(); box(150);
    pop();
}

function drawLiquidSolids() {
    push(); rotateY(time);
    stroke(0, 255, 200); noFill(); sphere(120, 8, 8);
    pop();
}

function drawDodeca() {
    push(); rotateY(time); rotateX(time*0.3);
    stroke(255, 255, 0); noFill();
    for(let i=0; i<12; i++) {
        rotateY(TWO_PI/12);
        beginShape();
        for(let j=0; j<5; j++) {
            let a = TWO_PI*j/5;
            vertex(cos(a)*100, sin(a)*100, 50);
        }
        endShape(CLOSE);
    }
    pop();
}

function drawAtomicGrid() {
    push();
    rotateY(time);
    for(let i=0; i<10; i++) {
        push(); rotateX(i*PI/5); noFill(); stroke(255, 50); ellipse(0,0,300,300); pop();
    }
    pop();
}

function drawLegacyCore() {
    push();
    rotateY(time*0.5);
    stroke(255); box(50);
    noFill(); stroke(255, 50); box(150);
    stroke(255, 20); box(250);
    pop();
}

</script>
</body>
</html>
