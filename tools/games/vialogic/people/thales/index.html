<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaMath | The First Sage (Thales)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #07090F; overflow: hidden;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas { display: block; }

        /* Act Indicator */
        #act-indicator {
            position: absolute; top: 30px; left: 30px;
            color: #FFD700; font-size: 14px; font-weight: bold; letter-spacing: 3px;
            text-transform: uppercase; z-index: 10;
            transition: opacity 0.4s ease-in-out; opacity: 1;
        }

        /* Main Info Box */
        #label {
            position: absolute; top: 60px; left: 30px;
            letter-spacing: 1px; border-left: 4px solid #FFD700; 
            padding-left: 20px; z-index: 10;
            background: rgba(7, 9, 15, 0.85); padding-right: 20px;
            padding-bottom: 15px; border-radius: 0 10px 10px 0;
            backdrop-filter: blur(8px); max-width: 80%;
            transition: opacity 0.4s ease-in-out; opacity: 1;
        }
        h1 { margin: 0; font-size: 26px; font-weight: 300; text-transform: uppercase; color: #fff; }
        #subtitle { color: #FFD700; font-size: 16px; margin-top: 5px; font-weight: bold; letter-spacing: 2px; }
        #description { color: #ccc; font-size: 15px; margin-top: 10px; max-width: 450px; line-height: 1.6; }

        /* Insight Bar */
        #insight-bar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 229, 255, 0.08);
            border-top: 1px solid rgba(0, 229, 255, 0.3);
            padding: 15px 0; text-align: center;
            font-size: 16px; color: #ddd; letter-spacing: 1px;
            font-family: monospace; backdrop-filter: blur(5px);
            transition: opacity 0.4s ease-in-out; opacity: 1;
        }
        .highlight { color: #FFD700; font-weight: bold; }

        /* Tap hint & Logo */
        #nav-hint {
            position: absolute; top: 30px; right: 30px;
            color: #666; font-size: 12px; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer;
            transition: opacity 0.4s ease-in-out; text-align: right;
        }
        .viamath-logo { color: #00E5FF; font-weight: bold; font-size: 16px; margin-bottom: 5px; letter-spacing: 3px;}

        @media (max-width: 700px) {
            #act-indicator { top: 20px; left: 10px; font-size: 12px; }
            #label { top: 45px; left: 10px; padding-left: 15px; max-width: 90%; }
            h1 { font-size: 20px; }
            #subtitle { font-size: 14px; }
            #description { font-size: 13px; max-width: 100%; }
            #insight-bar { font-size: 12px; padding: 10px 0; }
            #nav-hint { top: 10px; right: 10px; font-size: 10px; }
        }
    </style>
</head>
<body onclick="nextScreen()">
    <div id="nav-hint">
        <a href="../../" style="text-decoration:none"><div class="viamath-logo">← VIALOGIC</div></a>
        Tap anywhere to advance ➔
    </div>
    
    <div id="act-indicator">ACT I: THE HISTORY</div>

    <div id="label">
        <h1 id="title">Title</h1>
        <p id="subtitle">Subtitle</p>
        <p id="description">Description goes here.</p>
    </div>

    <div id="insight-bar">
        <span class="highlight">HISTORICAL INSIGHT:</span> <span id="insight-text">Loading...</span>
    </div>

<script>
let time = 0;
let state = 0;

let isTransitioning = false;
let fadeAlpha = 0;
let fadeDirection = 0;
let targetState = 0;
const FADE_SPEED = 12;

let particles = [];

const content = [
    // ACT I: THE HISTORY & THE LEGEND
    {
        title: "Before the Proof", sub: "Math as a Tool, Not a Truth",
        desc: "Long before modern mathematics, the ancient Egyptians and Babylonians used numbers merely as tools to count crops, collect taxes, and build temples. They knew what worked, but they never asked why.",
        insight: "Mathematics was purely empirical. There were no formulas, only rules of thumb."
    },
    {
        title: "The Battle of the Eclipse", sub: "May 28, 585 BC",
        desc: "Thales of Miletus was different. He studied Babylonian stars and famously predicted a total solar eclipse during a bloody war between the Medes and Lydians, causing them to drop their weapons in awe.",
        insight: "He proved that the cosmos operated on predictable mathematical patterns, not magic."
    },
    {
        title: "The Riddle of the Pyramid", sub: "Egypt's Impossible Question",
        desc: "Legend says the King of Egypt challenged Thales. The Great Pyramid of Giza was massive, and no human could reach its peak to drop a measuring tape. How could its precise height be calculated?",
        insight: "Thales realized he didn't need to climb the pyramid. He only needed the sun."
    },
    {
        title: "The Shadow Method", sub: "Similar Triangles in Action",
        desc: "Thales placed his walking stick in the sand. He waited until the exact moment of the day when the length of the stick's shadow was exactly equal to the stick's height.",
        insight: "At that exact moment, the length of the pyramid's massive shadow was equal to its height!"
    },
    // ACT II: THE MATHEMATICS & THE PROOFS
    {
        title: "Theorem I: The Bisection", sub: "The Circle's Symmetry",
        desc: "Having mastered empirical tricks, Thales shifted to logic. It seems obvious to us now, but he was the first to formally prove that any circle is perfectly bisected (cut in half) by its diameter.",
        insight: "A simple line passing through the center creates two perfectly identical areas."
    },
    {
        title: "Theorem II: The Isosceles", sub: "The Bridge of Asses",
        desc: "He proved that if a triangle has two sides of equal length (an isosceles triangle), then the angles opposite those sides must also be perfectly equal. A beautiful, unbreakable symmetry.",
        insight: "If side AB = side AC, then Angle B must exactly equal Angle C."
    },
    {
        title: "Theorem III: The Intersection", sub: "Vertical Angles",
        desc: "When two straight lines cross, they form an 'X'. Thales proved that the opposite angles (vertical angles) created by this intersection will always mirror each other perfectly, no matter the rotation.",
        insight: "Symmetry is an inescapable law of intersecting vectors."
    },
    {
        title: "Theorem IV: The Blueprint", sub: "ASA Triangle Congruence",
        desc: "If you know the length of just one side of a triangle, and the exact degrees of the two angles on either end, the entire rest of the triangle is mathematically locked into place.",
        insight: "This is ASA (Angle-Side-Angle). It is the ultimate blueprint for a shape."
    },
    {
        title: "Theorem V: The Crown Jewel", sub: "The Semicircle Right Angle",
        desc: "Draw a circle and a diameter line. Pick any point on the edge of that half-circle and connect it to the ends of the diameter. The angle formed at the edge will ALWAYS be exactly 90 degrees.",
        insight: "This is known today simply as 'Thales's Theorem'."
    },
    {
        title: "The Legacy of Logic", sub: "The Birth of Deductive Proof",
        desc: "By applying logical deduction to shapes, Thales proved that the universe is not run by chaos, magic, or angry gods, but by beautiful, decipherable mathematical laws.",
        insight: "Thales shifted humanity from Mythos (myth) to Logos (logic). Welcome to ViaMath."
    }
];

function setup() {
    createCanvas(windowWidth, windowHeight);
    for(let i=0; i<60; i++) {
        particles.push({x: random(width), y: random(height), s: random(1,3), a: random(TWO_PI)});
    }
    updateUI();
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }

function nextScreen() {
    // AWARD LOGIC
    if (state === TOTAL_SCREENS - 1) {
        if (!window.hasAwarded) {
             window.parent.postMessage({ type: 'sparks_award', amount: 250 }, '*');
             window.hasAwarded = true;
        }
    }

    if (isTransitioning) return;
    isTransitioning = true;
    fadeDirection = 1;
    targetState = (state + 1) % 10;
    
    document.getElementById("label").style.opacity = 0;
    document.getElementById("insight-bar").style.opacity = 0;
    document.getElementById("nav-hint").style.opacity = 0;
    document.getElementById("act-indicator").style.opacity = 0;
}

function updateUI() {
    document.getElementById("title").innerText = content[state].title;
    document.getElementById("subtitle").innerText = content[state].sub;
    document.getElementById("description").innerText = content[state].desc;

    let actInd = document.getElementById("act-indicator");
    let labelBorder = document.getElementById("label");
    
    if (state < 4) {
        actInd.innerText = "ACT I: THE HISTORY & THE LEGEND";
        actInd.style.color = "#FFD700"; // Gold
        labelBorder.style.borderLeftColor = "#FFD700";
    } else {
        actInd.innerText = "ACT II: THE GEOMETRY & THE PROOFS";
        actInd.style.color = "#00E5FF"; // Cyan
        labelBorder.style.borderLeftColor = "#00E5FF";
    }

    let span = document.querySelector('.highlight');
    if (state < 4) {
        span.innerText = "HISTORICAL INSIGHT:"; span.style.color = "#FFD700";
    } else if (state === 9) {
        span.innerText = "REFLECTION:"; span.style.color = "#00E5FF";
    } else {
        span.innerText = "GEOMETRIC LAW:"; span.style.color = "#00E5FF";
    }
    document.getElementById("insight-text").innerText = content[state].insight;
}

// Mobile-responsive scalar to prevent ANY out-of-bounds clipping
function getScaleFactor() {
    return min(1, width / 800);
}

function draw() {
    background(7, 9, 15); // Deep Night Blue

    // Subtle Grid
    stroke(255, 8); strokeWeight(1);
    for (let i = 0; i < width; i += 100) line(i, 0, i, height);
    for (let j = 0; j < height; j += 100) line(0, j, width, j);

    time += 0.02;

    // State Router
    if      (state === 0) drawPreMath();
    else if (state === 1) drawEclipse();
    else if (state === 2) drawPyramidChallenge();
    else if (state === 3) drawShadowMethod();
    else if (state === 4) drawTheorem1();
    else if (state === 5) drawTheorem2();
    else if (state === 6) drawTheorem3();
    else if (state === 7) drawTheorem4();
    else if (state === 8) drawTheorem5();
    else if (state === 9) drawLegacy();

    // Cinematic fade overlay
    if (isTransitioning) {
        fadeAlpha += FADE_SPEED * fadeDirection;
        if (fadeDirection === 1 && fadeAlpha >= 255) {
            fadeAlpha = 255; fadeDirection = -1;
            state = targetState; time = 0;
            updateUI();
            document.getElementById("label").style.opacity = 1;
            document.getElementById("insight-bar").style.opacity = 1;
            document.getElementById("act-indicator").style.opacity = 1;
            if (state !== 9) document.getElementById("nav-hint").style.opacity = 1;
        } else if (fadeDirection === -1 && fadeAlpha <= 0) {
            fadeAlpha = 0; isTransitioning = false; fadeDirection = 0;
        }
        push(); fill(7, 9, 15, fadeAlpha); noStroke(); rect(0, 0, width, height); pop();
    }
}

// ============================================================
// ACT I: THE HISTORY & THE LEGEND
// ============================================================

function drawPreMath() {
    push();
    for(let p of particles) {
        p.y -= 0.5; p.x += sin(p.a + time) * 0.5;
        if(p.y < 0) p.y = height;
        fill(255, 215, 0, 150 + sin(time * 2 + p.x)*50); noStroke();
        ellipse(p.x, p.y, p.s);
    }
    
    translate(width/2, height / 2 + 100);
    scale(getScaleFactor());
    
    fill(20, 15, 10); noStroke(); rect(-1000, 0, 2000, 1000); // Ground
    
    // Abstract building blocks (Ziggurats)
    let zx = 250;
    fill(25, 20, 15);
    for(let i=0; i<5; i++) {
        let w = 300 - i*60;
        rect(zx - w/2, -i*30 - 30, w, 30);
    }

    // Pyramid
    fill(30, 25, 20);
    triangle(-250 - 150, 0, -250 + 150, 0, -250, -200);

    // Primitive measuring lines
    stroke(255, 215, 0, 50); strokeWeight(2);
    line(-250, 0, -250, -200);
    line(zx, 0, zx, -150);
    pop();
}

function drawEclipse() {
    push();
    translate(width / 2, height / 2);
    scale(getScaleFactor());

    let sunR = 150;
    
    // Animate Moon moving across the Sun
    let progress = min(time * 0.4, 1.0);
    let moonX = map(progress, 0, 1, -sunR * 2.5, 0);

    if (progress < 1.0) {
        drawingContext.shadowBlur = 50;
        drawingContext.shadowColor = '#FFD700';
        fill(255, 215, 0); noStroke();
        ellipse(0, 0, sunR * 2);
        drawingContext.shadowBlur = 0;
    }

    fill(7, 9, 15); noStroke();
    ellipse(moonX, 0, sunR * 2 + 2); 

    if (progress >= 1.0) {
        for(let i=1; i<=6; i++) {
            let alpha = 100 / i + sin(time*5+i)*20;
            fill(255, 255, 255, alpha);
            ellipse(0, 0, sunR*2 + i*20);
        }
        fill(7, 9, 15); noStroke();
        ellipse(0, 0, sunR * 2 + 2);

        fill(255); textAlign(CENTER); textSize(24); letterSpacing = 4;
        text("THE SKY WENT DARK", 0, sunR + 80);
        fill(0, 229, 255); textSize(16); letterSpacing = 2;
        text("Geometry predicted the cosmos.", 0, sunR + 110);
    }
    pop();
}

function drawPyramidChallenge() {
    push();
    translate(width/2, height / 2 + 100);
    scale(getScaleFactor());
    
    fill(20, 15, 10); noStroke(); rect(-1000, 0, 2000, 1000);

    let pW = 400;
    let pH = pW * 0.63; 
    
    fill(15, 12, 10); 
    triangle(-pW/2, 0, pW/2, 0, 0, -pH);

    fill(255, 215, 0, 150 + sin(time*3)*100);
    textSize(80); textAlign(CENTER); fontStyle = "bold";
    text("?", 0, -pH/2);

    fill(255, 200); textSize(18); fontStyle = "normal";
    text("How do you measure something you cannot climb?", 0, 40);
    pop();
}

function drawShadowMethod() {
    push();
    translate(width/2, height/2 + 80);
    scale(getScaleFactor());
    
    stroke(255, 50); strokeWeight(2);
    line(-1000, 0, 1000, 0);

    // Center the whole scene to avoid clipping
    let sceneOffset = -50; 
    translate(sceneOffset, 0);

    let sunAngle = map(constrain(time * 0.5, 0, PI/4), 0, PI/4, 1.2, PI/4);
    let shadowMult = 1 / Math.tan(sunAngle);

    let pH = 180; let pW = 280;
    let pyramidX = -120; // Shift left
    
    fill(30, 25, 20); noStroke();
    triangle(pyramidX - pW/2, 0, pyramidX + pW/2, 0, pyramidX, -pH);
    
    let stickH = 40;
    let stickX = pyramidX + pW/2 + 120;
    stroke(255); strokeWeight(4);
    line(stickX, 0, stickX, -stickH);

    let pShadowLen = pH * shadowMult;
    let sShadowLen = stickH * shadowMult;

    fill(0, 0, 0, 150); noStroke();
    triangle(pyramidX, -pH, pyramidX + pW/2, 0, pyramidX + pShadowLen, 0);
    triangle(stickX, -stickH, stickX, 0, stickX + sShadowLen, 0);

    stroke(255, 215, 0, 100); strokeWeight(2); drawingContext.setLineDash([5, 5]);
    line(pyramidX, -pH, pyramidX + pShadowLen, 0);
    line(stickX, -stickH, stickX + sShadowLen, 0);
    drawingContext.setLineDash([]);

    if (sunAngle <= PI/4 + 0.01) {
        fill(0, 229, 255); noStroke(); textSize(14); textAlign(CENTER);
        text("Stick Height", stickX, -stickH - 10);
        text("=", stickX + sShadowLen/2, -10);
        text("Shadow L", stickX + sShadowLen/2, 20);
        
        fill(255, 215, 0);
        text("Pyramid Height", pyramidX, -pH - 15);
        text("=", pyramidX + pShadowLen/2, -10);
        text("Total Shadow Length", pyramidX + pShadowLen/2, 20);
        
        stroke(255, 100); strokeWeight(1);
        line(pyramidX + pShadowLen/2, 35, stickX + sShadowLen/2, 35);
    }
    pop();
}

// ============================================================
// ACT II: THE GEOMETRY & THE PROOFS
// ============================================================

function drawTheorem1() {
    push();
    translate(width / 2, height / 2);
    scale(getScaleFactor());
    let r = 160;
    
    stroke(255, 50); strokeWeight(2); noFill();
    ellipse(0, 0, r*2);

    let angle = time * 0.5;
    let dx = cos(angle) * r;
    let dy = sin(angle) * r;

    fill(0, 229, 255, 40); noStroke();
    arc(0, 0, r*2, r*2, angle, angle + PI);
    fill(255, 215, 0, 40);
    arc(0, 0, r*2, r*2, angle + PI, angle + TWO_PI);

    stroke(255); strokeWeight(3);
    line(-dx, -dy, dx, dy);

    fill(255); noStroke(); ellipse(0, 0, 8);

    fill(0, 229, 255); textAlign(CENTER); textSize(18);
    text("Area 1", cos(angle + PI/2) * r/2, sin(angle + PI/2) * r/2);
    fill(255, 215, 0);
    text("Area 2", cos(angle - PI/2) * r/2, sin(angle - PI/2) * r/2);
    
    fill(255, 200); textSize(18);
    text("Area 1  =  Area 2", 0, r + 50);
    pop();
}

function drawTheorem2() {
    push();
    translate(width / 2, height / 2 + 50);
    scale(getScaleFactor());
    
    let baseW = 300;
    let triH = 200 + sin(time * 1.5) * 80; 
    
    let ax = 0, ay = -triH;
    let bx = -baseW/2, by = 0;
    let cx = baseW/2, cy = 0;

    stroke(255, 50); fill(0, 229, 255, 15); strokeWeight(2);
    triangle(ax, ay, bx, by, cx, cy);

    stroke(0, 229, 255, 200); strokeWeight(4);
    line(ax, ay, bx, by);
    line(ax, ay, cx, cy);
    
    stroke(255); strokeWeight(2);
    line(ax/2 + bx/2 - 10, ay/2 + by/2 - 10, ax/2 + bx/2 + 10, ay/2 + by/2 + 10);
    line(ax/2 + cx/2 - 10, ay/2 + cy/2 + 10, ax/2 + cx/2 + 10, ay/2 + cy/2 - 10);

    stroke(255, 50); strokeWeight(2);
    line(bx, by, cx, cy);

    noFill(); stroke(255, 215, 0); strokeWeight(3);
    arc(bx, by, 60, 60, -atan2(triH, baseW/2), 0);
    arc(cx, cy, 60, 60, PI, PI + atan2(triH, baseW/2));

    fill(255); noStroke();
    ellipse(ax, ay, 8); ellipse(bx, by, 8); ellipse(cx, cy, 8);
    
    textSize(20); textAlign(CENTER);
    text("A", ax, ay - 15); text("B", bx - 20, by + 5); text("C", cx + 20, cy + 5);

    fill(255, 215, 0); textSize(18);
    text("∠ B  =  ∠ C", 0, 40);
    fill(0, 229, 255);
    text("Side AB  =  Side AC", 0, 70);
    pop();
}

function drawTheorem3() {
    push();
    translate(width / 2, height / 2);
    scale(getScaleFactor());

    let len = 250;
    let angle1 = time * 0.3;
    let angle2 = -PI/4 + sin(time * 0.8) * 0.5;

    stroke(255, 100); strokeWeight(3);
    line(cos(angle1)*-len, sin(angle1)*-len, cos(angle1)*len, sin(angle1)*len);
    line(cos(angle2)*-len, sin(angle2)*-len, cos(angle2)*len, sin(angle2)*len);

    let aMin = min(angle1, angle2);
    let aMax = max(angle1, angle2);
    if (aMax - aMin > PI) { let temp = aMin; aMin = aMax; aMax = temp + TWO_PI; }
    
    // Pair 1 (Gold)
    stroke(255, 215, 0); noFill(); strokeWeight(4);
    arc(0, 0, 100, 100, aMin, aMax);
    arc(0, 0, 100, 100, aMin + PI, aMax + PI);
    
    // Pair 2 (Cyan)
    stroke(0, 229, 255); noFill(); strokeWeight(4);
    arc(0, 0, 130, 130, aMax, aMin + PI);
    arc(0, 0, 130, 130, aMax + PI, aMin + TWO_PI);

    fill(255); noStroke(); ellipse(0,0,8);

    fill(255, 200); textAlign(CENTER); textSize(18); noStroke();
    text("Opposite angles are perfectly identical.", 0, len + 30);
    pop();
}

// RESTORED THEOREM 4 (ASA)
function drawTheorem4() {
    push();
    translate(width / 2, height / 2 + 50);
    scale(getScaleFactor());

    let baseLen = 300;
    let bx = -baseLen/2, cx = baseLen/2;
    
    // Fixed Base
    stroke(0, 229, 255); strokeWeight(5);
    line(bx, 0, cx, 0);
    
    // Animated Angles growing
    let grow = min(time * 0.5, 1.0);
    let angleB = radians(50) * grow;
    let angleC = radians(60) * grow;

    // Calculate Intersection A
    let ax = bx + (baseLen * Math.tan(angleC)) / (Math.tan(angleB) + Math.tan(angleC));
    let ay = -Math.tan(angleB) * (ax - bx);

    // Rays shooting from base
    stroke(255, 215, 0, 150); strokeWeight(2);
    let rayLen = 400;
    if(grow > 0.1) {
        line(bx, 0, bx + cos(-angleB)*rayLen, sin(-angleB)*rayLen);
        line(cx, 0, cx + cos(PI+angleC)*rayLen, sin(PI+angleC)*rayLen);
    }

    // Locked Triangle
    if (grow >= 1.0) {
        fill(0, 229, 255, 30); stroke(255); strokeWeight(3);
        triangle(ax, ay, bx, 0, cx, 0);
        
        fill(255); noStroke(); textSize(20); textAlign(CENTER);
        text("A (Locked)", ax, ay - 20);
        
        fill(255, 215, 0); textSize(16);
        text("KNOWN ANGLE", bx - 20, 35);
        text("KNOWN ANGLE", cx + 20, 35);
        fill(0, 229, 255);
        text("KNOWN SIDE", 0, 35);
    }

    // Draw angle arcs
    noFill(); stroke(255, 215, 0); strokeWeight(3);
    arc(bx, 0, 80, 80, -angleB, 0);
    arc(cx, 0, 80, 80, PI, PI+angleC);

    fill(255); noStroke();
    ellipse(bx, 0, 8); ellipse(cx, 0, 8);
    pop();
}

function drawTheorem5() {
    push();
    translate(width / 2, height / 2 + 30);
    scale(getScaleFactor());

    let r = 200;
    
    stroke(255, 50); strokeWeight(3); noFill();
    arc(0, 0, r*2, r*2, PI, TWO_PI);
    stroke(0, 229, 255);
    line(-r, 0, r, 0); // Diameter

    // Moving Point P on the arc
    let angle = PI + map(sin(time*1.2), -1, 1, 0.1, PI - 0.1); 
    let px = cos(angle) * r;
    let py = sin(angle) * r;

    stroke(255); strokeWeight(2);
    line(-r, 0, px, py);
    line(r, 0, px, py);

    // 90 degree indicator box
    let size = 25;
    let dx1 = -r - px; let dy1 = 0 - py;
    let len1 = sqrt(dx1*dx1 + dy1*dy1);
    let nx1 = dx1/len1; let ny1 = dy1/len1;

    let dx2 = r - px; let dy2 = 0 - py;
    let len2 = sqrt(dx2*dx2 + dy2*dy2);
    let nx2 = dx2/len2; let ny2 = dy2/len2;

    stroke(255, 215, 0); strokeWeight(3); noFill();
    beginShape();
    vertex(px + nx1*size, py + ny1*size);
    vertex(px + nx1*size + nx2*size, py + ny1*size + ny2*size);
    vertex(px + nx2*size, py + ny2*size);
    endShape();

    fill(255); noStroke();
    ellipse(-r, 0, 8); ellipse(r, 0, 8); 
    fill(255, 215, 0); ellipse(px, py, 12);

    fill(255, 215, 0); textSize(20); textAlign(CENTER);
    text("Always 90°", px, py - 30);
    fill(0, 229, 255); textSize(18);
    text("Diameter", 0, 30);
    pop();
}

function drawLegacy() {
    push();
    translate(width / 2, height / 2);
    scale(getScaleFactor());

    rotate(time * 0.1);
    
    let size = 200;

    stroke(255, 215, 0, 40); noFill(); strokeWeight(1);
    ellipse(0, 0, size*2);
    
    for(let i=0; i<3; i++) {
        stroke(0, 229, 255, 100 - i*20);
        let s = size - i*40;
        triangle(0, -s, s*cos(PI/6), s*sin(PI/6), -s*cos(PI/6), s*sin(PI/6));
        triangle(0, s, s*cos(PI/6), -s*sin(PI/6), -s*cos(PI/6), -s*sin(PI/6));
    }

    fill(255, 215, 0, 200 + sin(time * 3) * 55); noStroke();
    ellipse(0, 0, 20);

    for(let i=0; i<5; i++) {
        let a = TWO_PI * i/5 + time;
        fill(255);
        ellipse(cos(a)*size, sin(a)*size, 8);
        stroke(255, 50);
        line(0, 0, cos(a)*size, sin(a)*size);
    }
    pop();
}
</script>
