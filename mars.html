<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mars Decision Lab</title>
  <script src="./shared/vd-nav-fix.js"></script>
  <style>
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:#0b0f18;color:#e8eefc;display:grid;place-items:center;min-height:100vh;padding:16px}
    .card{max-width:760px;width:100%;background:#111827;border:1px solid #334155;border-radius:14px;padding:18px}
    .btn{display:inline-block;background:#ef4444;color:#fff;text-decoration:none;padding:10px 14px;border-radius:10px;font-weight:700}
    .muted{color:#94a3b8}
    iframe{width:100%;height:70vh;border:1px solid #334155;border-radius:12px;margin-top:12px;background:#020617}
  </style>
</head>
<body>
  <main class="card">
    <h1 style="margin:0 0 6px">🚀 Mars Decision Lab</h1>
    <p class="muted" style="margin:0 0 12px">If the embedded game is blocked by browser policy, use the launch button.</p>
    <a class="btn" href="https://via-decide.github.io/mars-decision-lab/" target="_blank" rel="noopener">Launch in New Tab →</a>
    <iframe src="https://via-decide.github.io/mars-decision-lab/" title="Mars Decision Lab"></iframe>
  </main>
</body>
</html>
