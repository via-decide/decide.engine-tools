<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool Registry Console • decide.engine</title>
  <style>body{margin:0;font-family:Inter,system-ui;background:#060916;color:#eef3ff}.page{max-width:980px;margin:0 auto;padding:20px}.panel{background:#11162a;border:1px solid #202a47;border-radius:12px;padding:12px}.btn{border:1px solid #202a47;background:transparent;color:#eef3ff;border-radius:10px;padding:8px 12px;cursor:pointer;text-decoration:none}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #202a47;padding:6px;text-align:left}</style>
</head>
<body>
  <main class="page">
    <div style="display:flex;justify-content:space-between;align-items:center"><h1>Tool Registry Console</h1><a class="btn" href="index.html">Back</a></div>
    <section class="panel">
      <button id="reload" class="btn">Reload Registry</button>
      <table><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Entry</th></tr></thead><tbody id="rows"></tbody></table>
    </section>
  </main>
  <script src="shared/tool-registry.js"></script>
  <script>
    async function render(){const tools=await window.ToolRegistry.loadAll();document.getElementById('rows').innerHTML=tools.map(t=>`<tr><td>${t.id}</td><td>${t.name}</td><td>${t.category}</td><td>${t.entry}</td></tr>`).join('');}
    document.getElementById('reload').onclick=render;render();
  </script>
</body>
</html>
