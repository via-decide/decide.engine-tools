<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>decide.engine tools platform</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1020; --panel:#151d33; --border:#2f3a59; --text:#eef3ff; --muted:#a9b6d4; --accent:#63a4ff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: linear-gradient(180deg,#0b1020,#060911); color: var(--text); }
    .platform-layout { min-height: 100vh; display: grid; grid-template-rows: auto auto 1fr auto; }
    .platform-header,.platform-footer { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .platform-footer { border-top: 1px solid var(--border); border-bottom: 0; color: var(--muted); }
    .platform-header h1 { margin: 0; font-size: 1.3rem; }
    .platform-header p { margin: 6px 0 0; color: var(--muted); }
    .platform-nav { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; border-bottom: 1px solid var(--border); }
    .nav-item { border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 999px; padding: 7px 11px; cursor: pointer; white-space: nowrap; }
    .platform-main { display: grid; grid-template-columns: 300px 1fr; min-height: 0; }
    .platform-sidebar { border-right: 1px solid var(--border); padding: 14px; display: grid; grid-auto-rows: max-content; gap: 10px; }
    .platform-sidebar input,.platform-sidebar select { width: 100%; margin-top: 6px; background: #0f1629; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
    .tool-list { display: grid; gap: 8px; overflow: auto; max-height: calc(100vh - 250px); }
    .tool-item { text-align: left; border: 1px solid var(--border); background: var(--panel); color: var(--text); border-radius: 10px; padding: 10px; cursor: pointer; display:grid; gap:3px; }
    .tool-item.active { border-color: var(--accent); }
    .tool-item span, .muted { color: var(--muted); font-size: .82rem; }
    .platform-tool-container { display: grid; grid-template-rows: auto 1fr; min-height: 0; }
    .tool-state { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--muted); }
    .tool-frame { border: 0; width: 100%; height: 100%; min-height: 70vh; background: #fff; }
    @media (max-width: 900px) { .platform-main { grid-template-columns: 1fr; } .platform-sidebar { border-right: 0; border-bottom: 1px solid var(--border);} }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="shared/tool-registry.js"></script>
  <script src="shared/layout.js"></script>
  <script src="router.js"></script>
  <script>window.Router.init();</script>
</body>
</html>
