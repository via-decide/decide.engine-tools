<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViaDecide StudyOS Hub</title>
  <link rel="stylesheet" href="./shared/shared.css?v=2" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0f1115; color: #e5e7eb; font-family: Inter, system-ui, sans-serif; }
    .shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid #263041; background: #151923;
      position: sticky; top: 0; z-index: 10;
    }
    .brand { font-weight: 700; font-size: 1rem; }
    .brand span { color: #60a5fa; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; }
    .nav-link {
      border: 1px solid #334155; background: #111827; color: #cbd5e1;
      padding: 8px 12px; border-radius: 999px; cursor: pointer; text-decoration: none;
      font-size: 0.9rem;
    }
    .nav-link.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    #route-title { font-size: 0.85rem; color: #93c5fd; }
    #app-outlet { min-height: 0; }
    .panel-frame { border: 0; width: 100%; height: calc(100vh - 60px); display: block; background: #0f1115; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand">ViaDecide <span>StudyOS</span></div>
        <div id="route-title">Dashboard</div>
      </div>
      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="#/" data-route="/">Dashboard</a>
        <a class="nav-link" href="#/studyos" data-route="/studyos">StudyOS</a>
        <a class="nav-link" href="#/tools" data-route="/tools">Tool Graph</a>
        <a class="nav-link" href="#/workflow" data-route="/workflow">Workflow Builder</a>
      </nav>
    </header>
    <main id="app-outlet" aria-live="polite"></main>
  </div>

  <script src="./shared/utils.js?v=2"></script>
  <script src="./shared/components.js?v=2"></script>
  <script src="./tools/registry.js?v=2"></script>
  <script src="./router.js?v=2"></script>
</body>
</html>
