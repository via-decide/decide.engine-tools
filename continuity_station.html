<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Continuity Station</title><style>body{background:#0a0e27;color:#e0e0e0;font-family:monospace}.container{display:grid;grid-template-columns:1fr 2fr 1.5fr;gap:1rem;padding:1rem;height:100vh}.panel{background:#1a1f3a;border:1px solid #2d3748;border-radius:6px;padding:1rem;overflow:auto}.node{background:#0f1419;border-left:3px solid #6ee7b7;padding:.75rem;margin-bottom:.5rem}</style></head><body><div class="container"><div class="panel"><h2>Replay Nodes</h2><div id="nodeList"></div></div><div class="panel"><h2>Replay DAG</h2><canvas id="dagCanvas"></canvas></div><div class="panel"><h2>Divergences</h2><div id="divs"></div><h2>Timeline</h2><div id="time"></div></div></div><script>const fb={nodes:{},conflicts:[]};Promise.all([fetch('./continuity/replay_graph/replay-consensus-report.json').then(r=>r.ok?r.json():fb).catch(()=>fb),fetch('./continuity/replay_graph/execution-drift-report.json').then(r=>r.ok?r.json():{}).catch(()=>({}))]).then(([c,d])=>{const nodes=(c.divergences?Object.keys(c.divergences):[]).map(id=>`<div class=node>${id}</div>`).join('');document.getElementById('nodeList').innerHTML=nodes||'<div class=node>No nodes</div>';document.getElementById('divs').textContent=JSON.stringify(c.conflicts||[],null,2);document.getElementById('time').textContent=JSON.stringify({confidence:c.consensus_confidence,drift:d.continuity_confidence_score},null,2);const cv=document.getElementById('dagCanvas');cv.width=cv.clientWidth||400;cv.height=300;const ctx=cv.getContext('2d');ctx.fillStyle='#0a0e27';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle='#6ee7b7';ctx.fillText('Deterministic DAG view (offline)',10,20);});</script></body></html>
